name: Automation Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create reports directory
        run: mkdir -p reports

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest pytest-html requests webdriver-manager playwright

      - name: Install Playwright browsers (with retries)
        run: |
          for i in {1..3}; do
            playwright install chromium --with-deps && break || sleep 10
          done

      - name: Run API tests
        run: |
          pytest tests/test_login.py -v --html=reports/report.html --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/report.html
