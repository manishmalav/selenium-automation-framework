name: Automation Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest pytest-html requests webdriver-manager playwright

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Install Chrome for Selenium
        uses: browser-actions/setup-chrome@v1

      - name: Run API and UI tests
        run: |
          pytest tests/test_login.py tests/test_search.py -v --html=reports/report.html --self-contained-html

      - name: Upload test report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-report
          path: reports/report.html
